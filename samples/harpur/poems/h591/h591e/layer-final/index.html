
<span class="page">107</span>
<h3 class="parthead">XXVIII.</h3>

<h3 class="title">A TITAN INCOG.</h3>

<p class="stanza"><span class="line">A <span class="smallcaps">dwarf</span> will ever be defiant</span>
<span class="line-indent1">Tow’rds men of larger being,</span>
<span class="line">From weening that he were a Giant</span>
<span class="line">(Though by Nature, to spare victual,</span>
<span class="line">Cunningly done up in little)</span>
<span class="line-indent1">But for their <span class="italics">mis-seeing</span>.</span></p>
