
<span class="page">97</span>
<h3 class="parthead">XI.</h3>

<h3 class="title">TO A GIRL WHO STOLE A YOUNG APPLE
TREE.</h3>

<p class="stanza"><span class="line"><span class="smallcaps">Alas</span>! from the beginning,</span>
<span class="line">In the records of sinning</span>
<span class="line">No comparative may grapple</span>
<span class="line-indent1">With a culprit like to thee!</span>
<span class="line">Eve herself but stole an apple—</span><span class="hard-hyphen">
</span><span class="line-indent1"><span class="italics">You</span> have filched an Apple Tree!</span></p>
