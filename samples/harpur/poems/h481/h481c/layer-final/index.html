
<span class="page">112</span>
<h3 class="parthead">XL.</h3>
<h3 class="title">A ROGUE-SAINT.</h3>

<p class="stanza"><span class="line"><span class="smallcaps">Of</span> all the kinds of scoundrel, great or small,</span>
<span class="line-indent1">That figure on our modern villians’ list,</span>
<span class="line">Defend me from the fellow who will bawl</span>
<span class="line-indent1">Loud prayers to heaven—the roguish pietist!</span>
<span class="line">For Virtue backs <span class="italics">his</span> bill, and the high road</span>
<span class="line"><span class="italics">He</span> robs on safest, is our faith in God!</span></p>
