<h3 class="title">Modern Poetry</h3>

<p class="stanza"><span class="line">How I hate those modern Poems</span>
<span class="line-indent1">Vaguer than a mystics’ dream!</span>
<span class="line">Pointless things that look like proems</span>
<span class="line-indent1">Only, to some held-back theme!</span>
<span class="line">Aye so unequal, as to sense</span>
<span class="line">As by steam ill-regulated!</span>
<span class="line">And if not super-lyrical,</span>
<span class="line">Then vapid, to a miracle</span></p>
