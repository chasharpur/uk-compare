<h3 class="title">Strictly Legal</h3>

<p class="stanza"><span class="line">Roe says one’s Doe’s a rogue—for why?</span>
<span class="line-indent1">He cheated him of <span class="underlined">six</span>, or <span class="underlined">more</span> <span class="underlined">pence</span></span>
<span class="line">And Doe pleads injury from a lie,</span>
<span class="line-indent1">Because the sum was <span class="underlined">only</span>—four <span class="underlined">pence</span>!</span></p>
