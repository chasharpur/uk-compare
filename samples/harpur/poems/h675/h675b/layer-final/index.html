<h3 class="parthead">III.</h3>

<h3 class="title">WHATEVER IS, IS RIGHT(?)</h3>

<p class="stanza"><span class="line">When Pope declared, Whatever is, is Right,</span>
<span class="line">Had he been whipt until he bled,</span>
<span class="line">Then salved with his own words in merry spite,</span>
<span class="line">I wonder what he could have said?</span></p>
