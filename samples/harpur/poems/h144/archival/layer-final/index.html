<h3 class="title">[UNTITLED FRAGMENT]</h3>

<p class="stanza"><span class="line">[...] And now, through the dim haze, there falls</span>
<span class="line-indent1">A shadow o’er my brain—</span><span class="hard-hyphen">
</span><span class="line">My Sire, whose form I had forgot,</span>
<span class="line-indent1">Seems here with us again.</span>
