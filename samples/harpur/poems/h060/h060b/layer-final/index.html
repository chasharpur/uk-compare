
<span class="page">5f</span>

<h3 class="parthead">X.</h3>

<h3 class="title"><span class="smallcaps">Capital Punishment</span>.</h3>

<p class="stanza"><span class="line">To string up a man for the very worst crime,</span>
<span class="line">Is like smashing a watch for not keeping good time.</span>
<span class="line">It were wiser in both cases (well understood)</span>
<span class="line">To use the bad man in a work of some good,</span>
<span class="line">And make the bad watch keep the best time we could.</span></p>
