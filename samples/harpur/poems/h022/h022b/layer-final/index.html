<h3 class="title">An Epitaph.</h3>

<p class="stanza"><span class="line">Be his rest who sleeps below,</span>
<span class="line">Done to death by toil and woe,</span>
<span class="line-indent1">Sound and sweet.</span>
<span class="line">So much in fortune did he lack,</span>
<span class="line-indent1">So little meet</span>
<span class="line">Of kindness, as with bleeding feet</span>
<span class="line">He journeyed Life’s most barren track;—[...]</span></p>
