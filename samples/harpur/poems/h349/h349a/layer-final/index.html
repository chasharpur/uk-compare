<h3 class="title">Epigram</h3>

<p class="stanza"><span class="line">I could not be so mere an ass</span>
<span class="line">As heed the censurs earthworms pass</span>
<span class="line">Upon my nature. They, poor elves!</span>
<span class="line">Are nurtured in the scurvy trick</span>
<span class="line">That prompts on other men to stick</span>
<span class="line">The dirt they find upon themselves.</span></p>
