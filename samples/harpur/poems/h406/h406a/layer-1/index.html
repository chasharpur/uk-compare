

<span class="page">73</span>
<h3 class="title">[PSALM XIII]</h3>

<p class="stanza"><span class="line">Even God hath judged me in the right,</span>
<span class="line">And wholly swept him from my sight!</span></p>

<p class="stanza"><span class="line">But I have trusted in thy power</span>
<span class="line">Have trusted for salvation’s hour;</span>
<span class="line">And ‘neath the shadow of thy wings</span>
<span class="line">Yet strike the harp with golden strings.</span></p>
