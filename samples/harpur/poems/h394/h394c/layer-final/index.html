<h3 class="title">Contrary Ways.</h3>

<p class="stanza"><span class="line">When the world’s way is running East</span>
<span class="line">D[o] you Keep your way running West</span>
<span class="line">And it is two to one at least,</span>
<span class="line-indent1">That you[r]s will prove the best</span>
<span class="line">For truth is seldom in request</span>
<span class="line">And all but the unpliant <span class="underlined">few</span></span>
<span class="line">Are held from using reason’s test</span>
<span class="line">By what the <span class="underlined">many</span> do.</span></p>
