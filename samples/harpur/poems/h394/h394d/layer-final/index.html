
<span class="page">109</span>
<h3 class="parthead">XXIX.</h3>

<h3 class="title">CONTRARY WAYS.</h3>

<p class="stanza"><span class="line"><span class="smallcaps">When</span> the world’s way is running east,</span>
<span class="line-indent1">Do you keep your way running west,</span>
<span class="line">And it is two to one at least</span>
<span class="line-indent1">That yours will prove the best:</span>
<span class="line">For truth is seldom in request,</span>
<span class="line-indent1">And all but the unpliant <span class="italics">few</span></span>
<span class="line">Are held from using reason’s test,</span>
<span class="line-indent1">By what the <span class="italics">many</span> do.</span></p>
