<h3 class="head">A Portion of Charles Harpur’s Wild Bee of Australia.</h3>

<h3 class="title">[OLD RHYME: OR IF NEW, WHAT MATTER?]</h3>

<p class="stanza"><span class="line">Though the Wild Bee may sting at times,</span>
<span class="line">Yet honey it will bring. |That rhymes!|</span>
<span class="line">So risk the Wild Bee’s stinging you,</span>
<span class="line">For the honey it is bringing too.</span></p>
<p class="trailer">Old Rhyme: or if New, what matter?</p>
