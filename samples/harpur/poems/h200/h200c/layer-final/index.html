<h3 class="title">[THE IRONBARK]</h3>

<p class="stanza"><span class="line">The ironbark—a rude hard name, but apt,</span>
<span class="line">As being first given by those men who first</span>
<span class="line">Heaved the loud-sounding axe with blistered hands,</span><span class="page">
50</span>
<span class="line">And swinkt at their compelled and weary toil</span>
<span class="line">Within the Australian forest, stretching wild</span>
<span class="line">And vast on all sides.</span></p>
<p class="trailer">M.S. Poem.</p>
