

<span class="page">137</span>

<h3 class="title">[THE PATHETIC]</h3>

<p class="stanza"><span class="line">Mere art can make a poem smooth as satin,</span>
<span class="line">But compass feeling can mere art in no man;</span>
<span class="line">Chiefly Because its tears are brought too pat in,</span>
<span class="line">And not as if they from a real woe ran:</span>
<span class="line">See for example, elegies in Latin</span>
<span class="line">Written by any but an ancient Ro-man.</span></p>
