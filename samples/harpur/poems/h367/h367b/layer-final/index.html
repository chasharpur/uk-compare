
<span class="page">109</span>
<h3 class="parthead">XXXI.</h3>

<h3 class="title">ORATORY.</h3>

<p class="stanza"><span class="line"><span class="smallcaps">Good</span> Prose is fine; good Poetry is finer;</span>
<span class="line-indent1">But that bright intermixture of the two</span>
<span class="line-indent1">Called Oratory, when in spirit true,</span>
<span class="line">And chaste in tone, is something still diviner!</span>
<span class="line">Having the light that in Verse <span class="italics">straitened</span> flows,</span>
<span class="line">With all the formal liberty of Prose.</span></p>
