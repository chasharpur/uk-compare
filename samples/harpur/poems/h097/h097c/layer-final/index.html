<h3 class="parthead">XI.</h3>

<h3 class="title">DOING AND BEING.</h3>

<p class="stanza"><span class="line">The common man’s of value to the race,</span>
<span class="line-indent1">For what he <span class="italics">do[e]s</span>—his worth is like his gold:</span>
<span class="line">But he that’s worthy of heroic place,</span>
<span class="line-indent1">For what he <span class="italics">is</span>—his value’s in his mould.</span></p>
