<h3 class="title">[TALENT AND GENIUS]</h3>

<p class="stanza"><span class="line">Talent is twelve pence to the shilling fair,</span>
<span class="line">(This illustration is as good as any)</span>
<span class="line">And Genius thirteen pence—or more: so there</span>
<span class="line">You have their difference almost to a penny.</span></p>
