<h3 class="parthead">V.</h3>

<h3 class="title"><span class="italics">Talent and Genius</span>.</h3>

<p class="stanza"><span class="line">Talent is twelve pence to the shilling fair,</span>
<span class="line-indent1">(This illustration is as good as any)</span>
<span class="line">And Genius, thirteen pence, or more—so there,</span>
<span class="line-indent1">You have their difference almost to a penny.</span></p>
