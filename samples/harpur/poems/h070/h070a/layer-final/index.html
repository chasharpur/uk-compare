
<span class="page">5c</span>

<h3 class="parthead">II.</h3>

<h3 class="title">“<span class="italics">Coins are Beautiful as Roses</span>.”</h3>

<p class="stanza"><span class="line">If coins are beautiful as roses,</span>
<span class="line">As the sage Emerson supposes,</span>
<span class="line-indent1">In this too must we all agree,</span>
<span class="line">That a joint stool is as complete</span>
<span class="line">For picture, as a garden seat,</span>
<span class="line-indent1">By dint of its utility.</span></p>
