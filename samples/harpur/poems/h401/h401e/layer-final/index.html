

<span class="page">252</span>

<h3 class="title">[PROSE POETRY]</h3>

<p class="stanza"><span class="line">On nerveless, tuneless lines how sadly</span>
<span class="line">Ringing rhymes may wasted be,</span>
<span class="line">While blank verse oft, is mere Prose, madly</span>
<span class="line">Striving to be Poetry:</span>
<span class="line">While Prose that’s craggy as a mountain,</span>
<span class="line">May Apollo’s sun-robe don,</span>
<span class="line">Or hold the well-spring of a fountain</span>
<span class="line">Bright as that in Helicon.</span></p>
