<h3 class="title">[RECORDS OF A POET’S LOVE XXIII]</h3>

<p class="stanza"><span class="line">“Alas, that Love so beautiful should be</span>
<span class="line">In Misery’s Ocean but a desert isle!”</span></p>

<p class="trailer"><span class="author">Charles Harpur.</span></p>
