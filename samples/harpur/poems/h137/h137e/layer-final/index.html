

<span class="page">91</span>
<h3 class="head">BITS.
BY CHARLES HARPUR.</h3>
<h3 class="parthead">I.</h3>

<h3 class="title">FOOLS ALL.</h3>

<p class="stanza"><span class="line"><span class="smallcaps">Could</span> half the foolish things that might be told</span>
<span class="line">Of each and all of us, be somehow rolled</span>
<span class="line-indent1">Into a visible heap upon our track,</span>
<span class="line-indent1">The wisest wariest—yea a Solomon!</span>
<span class="line">Would look behind him but to look upon</span>
<span class="line-indent1">A mountain of sheer folly at his back.</span></p>
