<h3 class="parthead">III.</h3>

<h3 class="title">[AN UGLY CHARACTER]</h3>

<p class="stanza"><span class="line">R x x x x x x, pretend to what thou wilt, but know</span>
<span class="line">Thy moral essence is expressed below.</span>
<span class="line">Age without wisdom: pride devoid of spirit:</span>
<span class="line">A world of vanity: a mite of merit.</span></p>
