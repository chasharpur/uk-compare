<h3 class="parthead">IV</h3>

<h3 class="title">Be patient with a Fool.</h3>

<p class="stanza"><span class="line">The wise man’s patience is a fool’s mere due,</span>
<span class="line">For the same reason that it vain would be,</span>
<span class="line">To look for color when no light shines through,</span>
<span class="line">Or beat the branch of a fruitless tree:</span>
<span class="line"><span class="soft-hyphen">An</span>d one that should lo<span class="unclear">ok far, </span>this should do,</span>
We<span class="line">re haply a far greater fool than he!

</span></p>
