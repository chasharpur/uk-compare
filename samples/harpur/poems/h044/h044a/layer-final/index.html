<h3 class="title">Epigram</h3>

<p class="stanza"><span class="line">‘Tis well for our minds, to disern</span>
<span class="line-indent1">What men mostly <span class="underlined">would</span> do;</span>
<span class="line">But better—far better, to learn</span>
<span class="line-indent1">What men alway <span class="underlined">should</span> do.</span></p>
