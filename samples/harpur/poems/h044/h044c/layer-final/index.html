<h3 class="head">Rhymes,
Humourous Poems,
Epigrams &c.</h3>

<h3 class="title">The Best Knowledge.</h3>

<p class="stanza"><span class="line">‘Tis well for our minds to discern</span>
<span class="line">What men mostly <span class="underlined">would</span> do;</span>
<span class="line">But better—far better, to learn</span>
<span class="line">What men always <span class="underlined">should</span> do.</span></p>
