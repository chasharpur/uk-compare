<h3 class="parthead">IV.</h3>

<h3 class="title">On a gay Printer.</h3>

<p class="stanza"><span class="line">One asked a Punster, whence could flow</span>
<span class="line">The cash that Ink’em sported so,</span>
<span class="line">In daily dash and nightly revel?</span>
<span class="line">God knows, said he—but ask the “devil”.</span></p>
