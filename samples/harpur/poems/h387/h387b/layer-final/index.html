

<span class="page">3a</span>
<h3 class="parthead">XV.</h3>
<h3 class="title">POETRY AND PROSE.</h3>

<p class="stanza"><span class="line">What is the true difference</span>
<span class="line-indent1">‘Twixt Prose and Rhyme,</span>
<span class="line">Since both may be beautiful,</span>
<span class="line-indent1">Both be sublime?</span>
<span class="line">Nor in subject, nor treatment,</span>
<span class="line-indent1">Nor passion it ‘bides—</span><span class="hard-hyphen">
</span><span class="line">But breathes through a certain</span>
<span class="line-indent1">Rich <span class="italics">something</span> besides.</span></p>
