<h3 class="parthead">XX.</h3>

<h3 class="title">WISDOM’S DWELLING.</h3>

<p class="stanza"><span class="line">A mind that’s made torpid by fortune may be</span>
<span class="line">Full and swift, like a brook, but not deep, like the
sea:</span>
<span class="line"><span class="soft-hyphen">An</span>d Wisdom loves peace, choosing only to dwell</span>
In<span class="line"> a soul deep enough to be quiet as well.

</span></p>
