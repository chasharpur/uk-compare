<h3 class="parthead">IX.</h3>

<h3 class="title">SELF REFERENCE.</h3>

<p class="stanza"><span class="line"><span class="smallcaps">What</span> an excellent creature is dear Mrs. G,—</span><span class="hard-hyphen">
</span><span class="line-indent1">Compared with most others she’s china to delf!</span>
<span class="line">Exclaims Mrs L,—and then adds in the key</span>
<span class="line-indent1">Of one thinking aloud: <span class="italics">she is so like myself</span>.</span></p>
