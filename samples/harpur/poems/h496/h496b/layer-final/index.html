

<span class="page">5a</span>
<h3 class="parthead">IV.</h3>
<h3 class="title">SELF REFERENCE AND PREFERENCE.</h3>

<p class="stanza"><span class="line">What an excellent creature is dear Mrs. G.,</span>
<span class="line">Compared with most others she’s China to delf;</span>
<span class="line">Exclaims Mrs. H.; and then adds in the key</span>
<span class="line">Of one thinking aloud—she is so like myself.</span></p>
