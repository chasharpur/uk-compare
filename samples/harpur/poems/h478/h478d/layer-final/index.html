
<span class="page">114</span>
<h3 class="parthead">XLVI.</h3>

<h3 class="title">THE RIGHTEOUSNESS OF NATURE.</h3>

<p class="stanza"><span class="line"><span class="smallcaps">In</span> vain let Logic prove</span>
<span class="line-indent1">That action right, which still we know</span>
<span class="line">To be oppressive, mean, or selfish,</span>
<span class="line-indent1"><span class="italics">Feeling</span> it is so.</span>
<span class="line">Here honesty of heart</span>
<span class="line-indent1">Orbs all the wisdom of the case,</span>
<span class="line">And to the Righteousness of Nature</span>
<span class="line-indent1">Logic <span class="italics">should</span> give place.</span></p>
