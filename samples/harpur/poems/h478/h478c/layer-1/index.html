<h3 class="title">The Righteousness of Nature.</h3>

<p class="stanza"><span class="line">In vain let Logic prove</span>
<span class="line">That right, which still we know</span>
<span class="line">To be oppressive, mean, or selfish,</span>
<span class="line"><span class="underlined">Feeling</span> it is so.</span>
<span class="line">Here honesty of heart’s</span>
<span class="line">The wisdom of the case:</span>
<span class="line">And to the Righteousness of Nature</span>
<span class="line">Logic <span class="underlined">should</span> give place.</span></p>
