

<span class="page">5F</span>
<h3 class="parthead">IX.</h3>

<h3 class="title"><span class="smallcaps">The Righteousness of Nature</span>.</h3>

<p class="stanza"><span class="line">In vain let Logic prove</span>
<span class="line-indent1">That right, which still we know</span>
<span class="line">To be oppressive, mean, or selfish,</span>
<span class="line-indent1"><span class="italics">Feeling</span> it is so.</span></p>

<p class="stanza"><span class="line">Here honesty of heart’s</span>
<span class="line-indent1">The wisdom of the case:</span>
<span class="line">And to the Righteousness of Nature</span>
<span class="line-indent1">Logic <span class="italics">should</span> give place.</span></p>
