<h3 class="parthead">XXII.</h3>

<h3 class="title">WHAT’S THE DIFFERENCE?</h3>

<p class="stanza"><span class="line">A fiddling difference once was said to be</span>
<span class="line">Just that ‘twixt tweedledum and tweedledee;</span>
<span class="line">And is there not as little difference truly</span>
<span class="line">‘Twixt <span class="italics">filching cash</span> and <span class="italics">charging it unduly?</span></span>
<span class="line">But, O ye Gods! if this be granted,—then</span>
<span class="line">What thieves on all hands pass for honest men!</span></p>
