<h3 class="head">To be added to the lines To Ellen.</h3>

<h3 class="title">[THE BEAUTIFUL V]</h3>

<p class="stanza"><span class="line">[...] Yet only the unblest can doubt you</span>
<span class="line">Have wealthier things than these about you;</span>
<span class="line">Deep spells and powers of Love, of which</span>
<span class="line">These are but formal tokens rich,</span>
<span class="line">Loving smiles and loving kisses,</span>
<span class="line">Warm delights and nameless blisses.</span></p>
