

<span class="page">5a</span>

<h3 class="parthead">VI.</h3>
<h3 class="title">ON THE DECEASE OF A FAT OLD RASCAL WHO DIED OF A SURFEIT.</h3>

<p class="stanza"><span class="line">He’s gone!—a sleek old sinner,</span>
<span class="line-indent1">Fat Ben!</span>
<span class="line">Who ate his twenty-thousandth dinner,</span>
<span class="line-indent1">And then,</span>
<span class="line">As heaven could no longer brook him,</span>
<span class="line-indent1">T’other place took him!</span></p>
