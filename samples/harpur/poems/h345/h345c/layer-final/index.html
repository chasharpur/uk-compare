

<span class="page">389</span>
<h3 class="title">On a Fat old Cheat who died of a surfeit.</h3>

<p class="stanza"><span class="line">A crafty, sleek old sinner,</span>
<span class="line-indent4">Fat Ben,</span>
<span class="line">Ate jollily his twenty thousandth dinner,</span>
<span class="line-indent4">And then,</span>
<span class="line">As Heaven could no longer brook him,</span>
<span class="line">The devil <span class="underlined">had</span> to take—and took him.</span></p>
