<h3 class="parthead">III.</h3>
<h3 class="title">On a Fat old Cheat who died of a Surfeit.</h3>

<p class="stanza"><span class="line">A crafty, sleek old Sinner,</span>
<span class="line-indent1">Fat Ben,</span><span class="page">
552</span>
<span class="line">Eat jollily his twenty thousandth dinner,</span>
<span class="line-indent1">And then,</span>
<span class="line">As Heaven could no longer brook him,</span>
<span class="line">T’other place <span class="underlined">had</span> to take—and took him.</span></p>
