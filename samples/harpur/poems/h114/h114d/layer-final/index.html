<h3 class="head"><span class="double-underlined">Bits</span>.</h3>

<h3 class="title">[ENDURING PROSE AND VERSE]</h3>

<p class="stanza"><span class="line">That generous, wine-like Prose will never die,</span>
<span class="line">Which is at once well rectified and fruity;</span>
<span class="line">Nor that bright Verse which, like the human eye,</span>
<span class="line">Is perfect form instinct with moral beauty.</span></p>
