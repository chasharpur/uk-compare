<h3 class="parthead">XXXII.</h3>
<h3 class="title">THE REAL CAUSE.</h3>

<p class="stanza"><span class="line"><span class="smallcaps">Terry</span> died, and his nephew <span class="italics">cried!</span></span>
<span class="line-indent1">A soft-eyed fact in this hard eyed age:</span>
<span class="line">But the truth is, Terry’s young wife had skill</span>
<span class="line">To get him struck out of his uncle’s will,</span>
<span class="line-indent1">And he cried--<span class="italics">for rage!</span></span></p>
