<h3 class="title">[THIS DAY I’VE LOST MY OFFICE]</h3>

<p class="stanza"><span class="line">This day I’ve lost my office, and again am a free man,</span>
<span class="line">With the wide world for mine oister, which I’ll open if I can.</span></p>

<p class="trailer"><span class="date">1<span class="superscript">st</span>. July, 1866.</span></p>
<p class="trailer"><span class="author">Charles Harpur.</span></p>
