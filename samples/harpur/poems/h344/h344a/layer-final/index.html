

<span class="page">1d</span>

<h3 class="title">EPITAPH FOR A MISER.</h3>

<p class="stanza"><span class="line">‘Tis held the wish, as ’tis the lot,</span>
<span class="line">Of Mortals when they go to pot,</span>
<span class="line">To take their souls off with them—but</span>
<span class="line-indent1">This old Put,</span>
<span class="line">Would have left <span class="smallcaps">his</span> behind him, I know,</span>
<span class="line">Much rather than <span class="smallcaps">its soul</span>—his rhino.</span></p>
