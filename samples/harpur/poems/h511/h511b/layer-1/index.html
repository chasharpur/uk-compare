<h3 class="title">A Similitude.</h3>

<p class="stanza"><span class="line">Downward, through the leafy roofage</span>
<span class="line">Of a forest bower,</span>
<span class="line">Come the yellow sunbeams, falling</span>
<span class="line">Like a burning shower;</span>
<span class="line">So, through the starry roof of Heaven</span>
<span class="line">To the soul’s abode,</span>
<span class="line">Comes the Holy Spirit, earthward</span>
<span class="line">Raying down from God.</span></p>
