<h3 class="parthead">XLIII.</h3>

<h3 class="title">A SIMILITUDE.</h3>

<p class="stanza"><span class="line"><span class="smallcaps">Downward</span>, through the leafy roofage</span>
<span class="line-indent1">Of a lonely forest bower,</span>
<span class="line">Come the yellow sunbeams, falling</span>
<span class="line-indent1">Like a burning shower;</span>
<span class="line">So, through the starry roof of heaven</span>
<span class="line-indent1">To the hermit soul’s abode,</span>
<span class="line">Comes the Holy Spirit, earthward</span>
<span class="line-indent1">Raying down from God.</span></p>
