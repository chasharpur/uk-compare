

<span class="page">88</span>
<h3 class="title">[A SIMILITUDE]</h3>

<p class="stanza"><span class="line"><span class="smallcaps">Downward</span>, through the blooming roofage</span>
<span class="line-indent2">Of a lonely forest bower,</span>
<span class="line-indent1">Come the yellow sunbeams,—falling</span>
<span class="line-indent2">Like a burning shower:</span>
<span class="line-indent1">So through heaven’s starry ceiling</span>
<span class="line-indent2">To the hermit soul’s abode,</span>
<span class="line-indent1">Comes the Holy Spirit,—earthward</span>
<span class="line-indent2">Raying down from God.</span></p>
