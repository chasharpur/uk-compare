

<span class="page">5b</span>
<h3 class="title"><span class="smallcaps">A Similitude</span>.</h3>

<p class="stanza"><span class="line">As down through the leafy roofage</span>
<span class="line-indent1">Of a forest bower,</span>
<span class="line">Come the yellow sunbeams, falling</span>
<span class="line-indent1">Like a burning shower;</span>
<span class="line">Through the intergrowth of Being</span>
<span class="line-indent1">To the soul’s abode,</span>
<span class="line">Comes the Holy Spirit, downward</span>
<span class="line-indent1">From the throne of God.</span></p>
