<h3 class="parthead">VII.</h3>

<h3 class="title"><span class="italics">Art, Labor and Nature</span>.</h3>

<p class="stanza"><span class="line">What can give beauty to a shapeless log,</span>
<span class="line">Or fitness to a drear unstable bog?</span>
<span class="line-indent1">The hand of Art and Labor’s wisdom only.</span>
<span class="line">But what can give them to a forest tree,</span>
<span class="line">Or vast lake with its mountain scenery?</span>
<span class="line-indent1">Nature alone,—dame Nature, working lonely.</span></p>
