
<span class="page">3a</span>
<h3 class="parthead">III.</h3>
<h3 class="title">FAST AND SLOW.</h3>

<p class="stanza"><span class="line">The man who is steady and slow, though he sin,</span>
<span class="line-indent1">Will seldom o’ertake a foregoing disaster;</span>
<span class="line">While the fast man for ever is breaking his shin</span>
<span class="line-indent1">Against ills in advance through his rage to go faster.</span></p>
