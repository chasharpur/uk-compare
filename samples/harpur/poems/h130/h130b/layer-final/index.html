

<span class="page">414</span>

<h3 class="parthead">III</h3>
<h3 class="title">Fast and slow</h3>

<p class="stanza"><span class="line">The slow-going man, <span class="sic">howevever</span> his sins</span>
<span class="line-indent1">Will seldom o’ertake a foregoing disaster,</span>
<span class="line">While a fast one for ever keeps breaking his shins</span>
<span class="line-indent1">Against ill, in advance through his rage to go faster.</span></p>
