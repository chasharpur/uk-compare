<h3 class="title">Epitaph.</h3>

<p class="stanza"><span class="line">He who once was Thomas Cullen</span>
<span class="line-indent1">Lies here at length without the gold</span>
<span class="line-indent1">He <span class="unclear">farmed</span> so gripingly of old!</span>
<span class="line">But with ten worms per cent his skull in</span>
<span class="line-indent1">(Or more, perchance, if all were told)</span>
<span class="line-indent3">Instead:</span>
<span class="line"><span class="soft-hyphen">An</span>d this is all that can be said</span>
In<span class="line-indent2"> Tom’s behalf
E</span>v<span class="line">en in the way of Epitaph.

</span></p>
