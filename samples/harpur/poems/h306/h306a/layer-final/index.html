

<span class="page">3a</span>

<h3 class="parthead">II.</h3>

<h3 class="title">THE EGOTISM OF POETS.</h3>

<p class="stanza"><span class="line">Though Bards be egotists, ‘twere wrong to din them</span>
<span class="line-indent1">About it, as a failing,—since their “I”</span>
<span class="line">Is representative of that within them</span>
<span class="line-indent1">Which should be published, and not mutely die.</span></p>
