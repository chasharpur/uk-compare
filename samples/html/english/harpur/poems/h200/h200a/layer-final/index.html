
<span class="page">346a</span>
<p class="stanza"><span class="line">The <span class="italics">ironbark</span>—a rude hard name, but apt,</span>
<span class="line">As being first given by those men who first</span>
<span class="line">Heaved the loud sounding axe with blistered hands,</span>
<span class="line">And swinked at their compelled and weary toil</span>
<span class="line">Within the Australian forest.</span></p>
<p class="trailer"><span class="smallcaps">M.S. Poem.</span></p>
