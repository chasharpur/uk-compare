
<span class="page">104</span>
<p class="stanza"><span class="line">The <span class="underlined">ironbark</span>—a rude hard name, but apt</span>
<span class="line">As being first given by those men who first</span>
<span class="line">Heaved the loud sounding axe with blistered hands,</span>
<span class="line">And swinkt at their compelled and sultry toil</span>
<span class="line">Within the Australian forest.</span></p>
<p class="trailer">M.S. Poem.</p>
