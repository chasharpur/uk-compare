

<span class="page">5a</span>
<h3 class="parthead">VII.</h3>

<h3 class="title">[AN UGLY CHARACTER]</h3>

<p class="stanza"><span class="line">R * * * * * *, pretend to what thou wilt, but know</span>
<span class="line">Thy moral essence is expressed below.</span>
<span class="line-indent1">Age without wisdom; pride devoid of spirit:</span>
<span class="line-indent1">A world of vanity: a mite of merit.</span></p>
