
<span class="page">112</span>
<h3 class="parthead">XLI.</h3>

<h3 class="title">AN UGLY CHARACTER.</h3>

<p class="stanza"><span class="line"><span class="smallcaps">Narsus</span>, pretend to what thou wilt—but see</span>
<span class="line">The sort of character Truth gives of thee:</span>
<span class="line">Age without wisdom: pride unbacked by spirit:</span>
<span class="line-indent1">A little useless learning, got by rote all:</span>
<span class="line">Twelve stone of vanity: one grain of merit:</span>
<span class="line-indent1">These, summ’d together, make thy true sum total!</span></p>
