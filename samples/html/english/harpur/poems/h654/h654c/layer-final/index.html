

<span class="page">421</span>

<h3 class="title">An Ugly Picture.</h3>

<p class="stanza"><span class="line">Narsus, <span class="underlined">pretend</span> to what thou wilt—but see</span>
<span class="line">The sort of Character Truth gives of thee:</span>
<span class="line">Age without wisdom: pride unbacked by spirit:</span>
<span class="line-indent1">A little useless learning, got by rote all:</span>
<span class="line">Twelve stone of vanity: one grain of merit:</span>
<span class="line">These, summ’d together, make thy true sum to-tal.</span></p>
