<h3 class="title">An Epigram</h3>

<p class="stanza"><span class="line">There are Nations of slaves that were once nobly free,</span>
<span class="line-indent1">While those that are free against Freedom rebel:</span>
<span class="line"><span class="soft-hyphen">Ma</span>n’s political doom seems forever to be</span>
“U<span class="line-indent1">nstable as water, thou shalt not excel!”

</span></p>
