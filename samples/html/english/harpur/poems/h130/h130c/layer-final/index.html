<h3 class="parthead">II.</h3>
<h3 class="title">FAST AND SLOW.</h3>

<p class="stanza"><span class="line"><span class="smallcaps">The</span> slow-going man, howsoever he sins,</span>
<span class="line-indent1">Will seldom o’ertake a fore-running disaster,</span>
<span class="line">While a fast one for ever keeps breaking his shins</span>
<span class="line-indent1">Against ills in advance through his rage to get
faster.</span></p>
