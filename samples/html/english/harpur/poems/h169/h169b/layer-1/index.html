

<span class="page">86</span>

<h3 class="title">[HAPPY SPITE]</h3>

<p class="stanza"><span class="line">Love is wayward, Beauty wilful,</span>
<span class="line">Hence however—ever skilful</span>
<span class="line">Be the wit that like a gem,</span>
<span class="line">Would supremely richen them,</span>
<span class="line">They will sometimes take offence</span>
<span class="line">At the very brightest sense,</span>
<span class="line">As though for happy spite they meant</span>
<span class="line">To clothe delight with discontent.</span></p>
