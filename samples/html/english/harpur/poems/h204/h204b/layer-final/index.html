

<span class="page">66</span>

<p class="stanza"><span class="line">[...] Who never abandons an old friend</span>
<span class="line-indent1">So soon as his luck’s in a hitch,</span>
<span class="line">Or maketh o’ermuch of a cold friend</span>
<span class="line-indent1">For the reason alone that he’s rich;</span>
<span class="line">But to either, if pressed, would some gold
lend,</span>
<span class="line-indent1">Without being nice as to which:</span>
<span class="line-indent2">Though he fuddle sometimes &c.[...]</span></p>
