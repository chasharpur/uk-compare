

<span class="page">3a</span>
<h3 class="parthead">VII.</h3>

<h3 class="title">VAGUE BEAUTY IN POETRY.</h3>

<p class="stanza"><span class="line">How oft has Song some beauty most divine,</span>
<span class="line">Which well we feel, yet cannot well define?</span>
<span class="line">Some yearning excellence, intense and far,</span>
<span class="line">Coming and going like a clouded star?</span>
<span class="line">Some awful glory we but half descry,</span>
<span class="line">Like a strong sunset in a stormy sky?</span></p>
