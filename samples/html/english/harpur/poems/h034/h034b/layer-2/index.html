<h3 class="parthead">IV</h3>

<h3 class="title">Be patient with a Fool.</h3>

<p class="stanza"><span class="line">The wise man’s patience is a fool’s mere due,</span>
<span class="line">Because to chide such were <span class="underlined">that</span> fool to be,</span>
<span class="line">Who looks for color where no light shines through,</span>
<span class="line">Should cast a stone up at a fruitless tree:</span>
<span class="line"><span class="soft-hyphen">An</span>d one who such a si<span class="unclear">lly d</span>eed should do,</span>
We<span class="line">re haply a far greater dolt than he!

</span></p>
