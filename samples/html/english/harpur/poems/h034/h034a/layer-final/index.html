
<span class="page">5a</span>

<h3 class="title">[BE PATIENT WITH A FOOL]</h3>

<p class="stanza"><span class="line">The wise man’s patience is the Fool’s mere due,</span>
<span class="line-indent1">For the same reason that it vain would be</span>
<span class="line">To look for color where no light shines through,</span>
<span class="line-indent1">Or cast a stone up at a fruitless tree.</span></p>
