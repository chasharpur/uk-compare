

<span class="page">5c</span>

<h3 class="title">FINISH OF STYLE.</h3>

<p class="stanza"><span class="line">A last fine touch will add to, not diminish,</span>
<span class="line-indent1">The value of all Beauty—never doubt it;</span>
<span class="line">And what deserveth not a perfect finish,</span>
<span class="line-indent1">Must, on the whole, be very bad without it.</span></p>
