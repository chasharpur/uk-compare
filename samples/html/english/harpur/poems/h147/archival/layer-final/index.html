<h3 class="title">[FRAGMENT (6)]</h3>

<p class="stanza"><span class="line">The Moon rose like a wasted Lady when</span>
<span class="line">From her sick chamber led, by the insane</span>
<span class="line">And <span class="unclear">feeble</span> sending of her failing brain,</span>
<span class="line">A white & shapeless mass.</span></p>
