
<span class="page">103</span>
<h3 class="parthead">XVIII.</h3>

<h3 class="title">THE BEST KNOWLEDGE.</h3>

<p class="stanza"><span class="line">It is well for our minds to discern,</span>
<span class="line-indent1">What men mostly <span class="italics">would</span> do;</span>
<span class="line">But very much better to learn</span>
<span class="line-indent1">What men always <span class="italics">should</span> do.</span></p>
