<h3 class="title">The best knowledge</h3>

<p class="stanza"><span class="line">Tis well for our minds to discern</span>
<span class="line-indent1">What men mostly <span class="underlined">would</span> do;</span>
<span class="line">But very much better to learn</span>
<span class="line-indent1">What men always <span class="underlined">should</span> do.</span></p>
