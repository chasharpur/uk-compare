

<span class="page">3A</span>

<h3 class="parthead">XII.</h3>

<h3 class="title">THE MERIT OF SOBRIETY.</h3>

<p class="stanza"><span class="line">To him whose nature craves not drink</span>
<span class="line">No merit can accrue, I think,</span>
<span class="line-indent1">From the disuse of rum:</span>
<span class="line">But he who hath a thirsty soul,</span>
<span class="line">Yet keeps his drouth in good control,</span>
<span class="line-indent1">Hath, beyond question, <span class="italics">some</span>.</span></p>
