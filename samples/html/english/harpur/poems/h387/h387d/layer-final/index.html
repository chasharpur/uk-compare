

<span class="page">104</span>

<h3 class="title">[POETRY AND PROSE]</h3>

<p class="stanza"><span class="line">What is the true difference ‘twixt Prose and Rhyme,</span>
<span class="line">Since both may be beautiful, both be sublime?</span>
<span class="line">Nor in subject, nor treatment, nor passion it ‘bides—</span><span class="hard-hyphen">
</span><span class="line">But breathes through a certain rich <span class="underlined">something</span> besides.</span></p>
