<h3 class="head">Songs, Odes, and other Lyrics.</h3>

<h3 class="title">[CORA].</h3>

<p class="stanza"><span class="line">[...] Or should the bright time of her birth,</span>
<span class="line">And death, instruct our pain,</span>
<span class="line">That like the Spring, though not on Earth,</span>
<span class="line">Our Joy shall bloom again?</span></p>
