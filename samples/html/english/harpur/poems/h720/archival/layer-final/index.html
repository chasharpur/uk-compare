

<span class="page">95</span>

<p class="stanza"><span class="line">Friendship is but a word inscribed upon</span>
<span class="line">The unclouded face of Fortune’s morning sun;</span>
<span class="line">Hence if inclement vapors intervene</span>
<span class="line">And clear not off at length,—no more it may be seen.</span></p>
