<h3 class="title">The Real Cause.</h3>

<p class="stanza"><span class="line">Terry died, and his nephew <span class="underlined">cried</span>!</span>
<span class="line">A soft looking looking fact in this iron-like age:</span>
<span class="line">But the truth is, Terry’s young wife had skill</span>
<span class="line">To get him struck out of his uncle’s will,</span>
<span class="line">And he cried—<span class="underlined">for</span> <span class="underlined">rage</span>!</span></p>
