<h3 class="title">[THE CREEK OF THE FOUR GRAVES]</h3>

<p class="stanza"><span class="line">[...]—westward the high massing wood,</span>
<span class="line">Steaped in a dusk and deepening beauty, lay</span>
<span class="line">Distinctly traced against the twilight heaven,</span>
<span class="line">Even like a mighty picture of itself.</span></p>
