<h3 class="title">“Whatever Is is Right?”</h3>

<p class="stanza"><span class="line">When Dan Pope wrote Whatever is, is right:</span>
<span class="line">Had he been whipped—ay, whipped until he bled,</span>
<span class="line">Then salved with own words in merry spite,</span>
<span class="line">I wonder what he <span class="underlined">would</span> or <span class="underlined">could</span> have said?</span></p>
