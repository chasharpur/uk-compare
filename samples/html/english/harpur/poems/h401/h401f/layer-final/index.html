<h3 class="title">[PROSE POETRY]</h3>

<p class="stanza"><span class="line-indent1"><span class="smallcaps">On</span> nerveless, tuneless lines how sadly</span>
<span class="line-indent1">Ringing rhymes may wasted be,</span>
<span class="line-indent1">While blank verse oft is mere prose madly</span>
<span class="line-indent1">Striving to be poetry:</span>
<span class="line-indent1">While prose that’s craggy as a mountain</span>
<span class="line-indent1">May Apollo’s sun-robe don,</span>
<span class="line-indent1">Or hold the well-spring of a fountain</span>
<span class="line-indent1">Bright as that in Helicon.</span></p>
