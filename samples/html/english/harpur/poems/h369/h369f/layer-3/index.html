<h3 class="title">[OUTWARD BOUND]</h3>

<p class="stanza"><span class="line">Now fill we a full measure</span>
<span class="line-indent1">To the friends we left to day</span>
<span class="line">Whose love shall voyage
with us</span>
<span class="line-indent1">On our oceanic way:</span>
<span class="line">Where diurnally remind us</span></p>
