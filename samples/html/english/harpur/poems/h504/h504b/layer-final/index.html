<h3 class="parthead">IV</h3>

<p class="stanza"><span class="line">The race of men is as the race of leaves:</span>
<span class="line"><span class="soft-hyphen">So</span>me the winds shed upon the ground; while still</span>
Th<span class="line">e fructifying boughs put others forth,
T</span>o<span class="line"> flourish in their season. So of men
T</span>h<span class="line">e generations die and are renewed.
