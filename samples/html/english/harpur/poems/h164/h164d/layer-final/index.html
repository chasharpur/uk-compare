<h3 class="head">Rhymes,
Humourous Poems,
Epigrams &c.</h3>

<h3 class="title">Great Truth Seers.</h3>

<p class="stanza"><span class="line">Great Truths are plain but to the few</span>
<span class="line">Who look from Nature’s boldest height,</span>
<span class="line">And thence, in fearless thought, pursue,</span>
<span class="line"><span class="underlined">Not</span> the Expedient—<span class="underlined">but</span> the Right.</span></p>
