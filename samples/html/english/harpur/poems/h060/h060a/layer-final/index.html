<h3 class="title">Capital Punishment.</h3>

<p class="stanza"><span class="line">Putting to death for the very worst crime</span>
<span class="line">Is like breaking a watch for not keeping time:</span>
<span class="line">Twer wiser in both case (well understood)</span>
<span class="line">To use the bad man in a work of some good</span>
<span class="line">And make the bad keep the best time we could.</span></p>
