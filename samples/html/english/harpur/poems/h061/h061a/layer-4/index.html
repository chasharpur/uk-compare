<h3 class="title">A case for the Lawyers</h3>

<p class="stanza"><span class="line">Roe says one Doe’s a scurvy rogue—for why?</span>
<span class="line-indent1">He cheated him of <span class="underlined">two</span> or <span class="underlined">more</span> <span class="underlined">pence</span></span>
<span class="line">And Doe pleads injury from a wicked lie,</span>
<span class="line-indent1">Because the smuggled sum was only—<span class="underlined">four</span> pence!</span></p>
