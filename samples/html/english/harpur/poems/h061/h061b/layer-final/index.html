<h3 class="parthead">XXXVII.</h3>

<h3 class="title">A CASE FOR THE LAWYERS.</h3>

<p class="stanza"><span class="line"><span class="smallcaps">Roe</span> says one Doe’s a scurvy rogue—for why?</span>
<span class="line-indent1">He cheated him of <span class="italics">five</span>, or <span class="italics">six</span>, or more pence;</span>
<span class="line">And Doe pleads injury from a wicked lie,</span>
<span class="line-indent1">Because the smuggled sum was only—<span class="italics">four</span> pence!</span></p>
