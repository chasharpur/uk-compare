

<span class="page">5a</span>
<h3 class="parthead">VIII.</h3>

<h3 class="title">TO A GIRL WHO STOLE A YOUNG APPLE TREE.</h3>

<p class="stanza"><span class="line">Alas! from the beginning,</span>
<span class="line">In the record of all sinning,</span>
<span class="line">No parallel may grapple</span>
<span class="line">With a culprit like to thee!</span>
<span class="line">Eve only stole an apple—</span><span class="hard-hyphen">
</span><span class="line">You have filched an apple tree!</span></p>
