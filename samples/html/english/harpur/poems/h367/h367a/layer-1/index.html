<h3 class="title">Oratory.</h3>

<p class="stanza"><span class="line">Good Prose is fine; good Poetry is finer;</span>
<span class="line">But that bright intermixture of the two</span><span class="page">
386</span>
<span class="line">Called Oratory, when in spirit true,</span>
<span class="line">And chaste in form, is something still diviner.</span></p>
