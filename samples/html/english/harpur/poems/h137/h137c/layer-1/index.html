<h3 class="head">Bits</h3>
<h3 class="parthead">I</h3>
<h3 class="title">Fools All.</h3>

<p class="stanza"><span class="line">Could <span class="underlined">all</span> the foolish things that <span class="underlined">might</span> be told</span>
<span class="line">Of each and ever of us be somehow rolled</span>
<span class="line-indent1">Into a visible heap upon our track,</span>
<span class="line">The wisest—yea, a Solomon, alack!</span>
<span class="line-indent1">Would look behind him—only to behold</span>
<span class="line">A mountain of sheer folly at his back.</span></p>
