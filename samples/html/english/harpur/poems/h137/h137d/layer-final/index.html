<h3 class="title">Fools All.</h3>

<p class="stanza"><span class="line">Yea: did a Solomon but speak the truth</span>
<span class="line">Of his own life’s course—upward from its youth,</span>
<span class="line">He’d cry—Alack!</span>
<span class="line">If all my follies on a heap were rolled,</span>
<span class="line">Even I should look behind—to behold</span>
<span class="line"><span class="underlined">A</span> <span class="underlined">mountain</span> <span class="underlined">at</span> <span class="underlined">my</span> <span class="underlined">back</span>!</span></p>
