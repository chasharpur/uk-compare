

<span class="page">5f</span>

<h3 class="parthead">IV.</h3>

<h3 class="title"><span class="smallcaps">Fools All</span>.</h3>

<p class="stanza"><span class="line">Yea: did a Solomon but speak the truth</span>
<span class="line">Of his own life’s course—upward from its youth,</span>
<span class="line-indent2">He’d cry alack!</span>
<span class="line">If all my follies on a heap were rolled,</span>
<span class="line">Even I should look behind me—to behold</span>
<span class="line-indent1"><span class="italics">A mountain at my back!</span></span></p>
