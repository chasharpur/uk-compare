<h3 class="head">A String of Epigrams.</h3>
<h2 class="subtitle">/Given without comment./</h2>
<h3 class="parthead">I.</h3>

<h3 class="title">On a Defunct Miser.</h3>

<p class="stanza"><span class="line">Tis held the wish, as ’tis the lot,</span>
<span class="line">Of Mortals, when they go to pot,</span>
<span class="line">To take their souls off with them; but</span>
<span class="line-final">This old Put,</span>
<span class="line">Would have left his behind him, <span class="underlined">I</span> know,</span>
<span class="line">Much rather than <span class="underlined">its soul</span>—his rhino.</span></p>
