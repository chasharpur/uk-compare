
<span class="page">105</span>
<h3 class="parthead">XXI.</h3>

<h3 class="title">ON A DEFUNCT MISER.</h3>

<p class="stanza"><span class="line">‘Tis thought that when death sends us packing,</span>
<span class="line">The wish in none is ever lacking</span>
<span class="line-indent1">To have their souls for pilots—but</span>
<span class="line-indent2">This old Put,</span>
<span class="line">Would have left his behind him, <span class="italics">I</span> know,</span>
<span class="line">Much rather than <span class="italics">its soul</span>—his rhino!</span></p>
