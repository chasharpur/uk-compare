

<span class="page">5a</span>

<h3 class="parthead">V.</h3>
<h3 class="title">ON A DEFUNCT MISER.</h3>

<p class="stanza"><span class="line">‘Tis held the wish, as ’tis the lot</span>
<span class="line">Of mortals, when they go to pot,</span>
<span class="line">To take their souls off with them; but</span>
<span class="line-indent1">This old Put,</span>
<span class="line">Would have left his behind him, I know,</span>
<span class="line">Much rather than its soul—his rhino.</span></p>
