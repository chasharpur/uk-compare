<h3 class="title">For the Wrath of Love</h3>

<p class="stanza"><span class="line">[...] And Love, thus reconciled, again</span>
<span class="line">Becomes the exalter of our life:</span>
<span class="line">Winning rich sunsets of out of pain—</span><span class="hard-hyphen">
</span><span class="line-indent1">And rainbows out of strife.</span></p>
