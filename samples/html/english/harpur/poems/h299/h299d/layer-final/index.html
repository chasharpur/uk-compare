
<span class="page">112</span>
<h3 class="parthead">XXXVIII.</h3>
<h3 class="title">MORAL FAITH.</h3>

<p class="stanza"><span class="line"><span class="smallcaps">Oh</span>, could we but greatly believe in others,</span>
<span class="line-indent1">How greatly better we ourselves should be!</span>
<span class="line">A want of moral faith is that which smothers</span>
<span class="line-indent1">In human spirits, all divinity:</span>
<span class="line">And we are bad exactly to that span</span>
<span class="line">Which truly measures our despair of Man.</span></p>
