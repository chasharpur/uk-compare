

<span class="page">420</span>
<h3 class="title">Keep your own path.</h3>

<p class="stanza"><span class="line">When the world’s way is running East</span>
<span class="line-indent1">Keep your way running West,</span>
<span class="line">And it is two to one at least,</span>
<span class="line-indent1">That you[r]s will prove the best</span>
<span class="line">For all but the unpliant <span class="underlined">few</span></span>
<span class="line">May be deterred from Truth’s stern test</span>
<span class="line">By what the <span class="underlined">many</span> do.</span></p>
