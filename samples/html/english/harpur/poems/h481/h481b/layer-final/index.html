

<span class="page">389</span>
<h3 class="title">A Rogue-Saint.</h3>

<p class="stanza"><span class="line">Of all the kinds of scoundrel, great or small,</span>
<span class="line">That figure on our modern villains’ list,</span>
<span class="line">Defend me from the fellow who will bawl</span>
<span class="line">Loud prayers to Heaven—the roguish pietist!</span>
<span class="line">For Virtue backs <span class="underlined">his</span> bill, and the high road</span>
<span class="line"><span class="underlined">He</span> robs on safest, is our faith in God.</span></p>
