
<span class="page">109b</span>
<h3 class="parthead">XXX.</h3>

<h3 class="title">ENDURING PROSE AND VERSE.</h3>

<p class="stanza"><span class="line"><span class="smallcaps">That</span> generous wine-like Prose will never die,</span>
<span class="line-indent1">Which is at once well rectified and fruity,</span>
<span class="line">Nor that bright Verse which, like the human eye,</span>
<span class="line-indent1">Is perfect form, instinct with moral beauty.</span></p>
