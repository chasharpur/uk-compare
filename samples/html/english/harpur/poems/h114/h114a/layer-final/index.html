

<span class="page">5f</span>

<h3 class="parthead">VIII.</h3>

<h3 class="title"><span class="smallcaps">Enduring Prose and Vital Verse</span>.</h3>

<p class="stanza"><span class="line">That generous wine-like Prose will never die</span>
<span class="line-indent1">Which is at once well rectified and fruity:</span>
<span class="line">Nor that bright Verse which, like the human eye,</span>
<span class="line-indent1">Is vital form instinct with moral beauty.</span></p>
