<h3 class="title">Where’s the difference?</h3>

<p class="stanza"><span class="line">A fiddling difference on[c]e was said to be</span>
<span class="line">Just that ‘twixt tweedledum and tweedledee;</span>
<span class="line">And is there more than such a difference truly</span>
<span class="line">Twixt <span class="underlined">filching</span> <span class="underlined">cash</span> and <span class="underlined">charging</span> <span class="underlined">it</span> <span class="underlined">unduly</span>?</span>
<span class="line">But oh, ye Gods! if this be granted,—then</span>
<span class="line">What thieves on all hands pass for honest men!</span></p>
