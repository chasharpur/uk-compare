

<span class="page">628</span>

<h3 class="title">The Good Opinion of the world.</h3>

<p class="stanza"><span class="line">As a down feather by the wind</span>
<span class="line-indent1">Is this way whisked, and that way hurled,</span>
<span class="line">So is the man who trims his mind</span>
<span class="line-indent1">To suit the judgment of the world.</span>
<span class="line">Who heedeth much the world’s opinion</span>
<span class="line">Will be as much its facile minion</span></p>
