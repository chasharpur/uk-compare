
<span class="page">107</span>
<h3 class="parthead">XXVII.</h3>
<h3 class="title">SIMPLICTY <span class="italics">VERSUS</span> CRAFT.</h3>

<p class="stanza"><span class="line"><span class="smallcaps">Simplicity</span> enjoys while Craft contrives,</span>
<span class="line-indent1">Till life with both hath lost its pristine zest,</span>
<span class="line">And the mere memory of the past survives—</span><span class="hard-hyphen">
</span><span class="line-indent1">Of pleasure or of care,—say, which is best?</span></p>
