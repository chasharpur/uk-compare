<h3 class="parthead">IV.</h3>

<h3 class="title">HOW TO LESSEN A FLUX OF VISITORS.</h3>

<p class="stanza"><span class="line">Are you troubled by men with a visiting itch,</span>
<span class="line-indent1">And would you be rid of so constant a bore?</span>
<span class="line">Lend to him that is poor, and from him that is rich</span>
<span class="line-indent1">Seek to borrow——and neither will trouble you more.</span></p>
