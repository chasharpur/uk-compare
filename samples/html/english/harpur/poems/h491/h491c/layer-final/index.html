

<span class="page">655</span>

<h3 class="title">[THE SCAMPER OF LIFE]</h3>

<p class="stanza"><span class="line">Till even his coachman-father’s ghost,</span>
<span class="line-indent1">Haply in his cold</span>
<span class="line-indent1">Down there in its grim berth shall say:</span>
<span class="line">Bedad! I think the ‘Stralian Isle</span>
<span class="line-indent1">Has shied, and broken a girth to-day!</span>
<span class="line">Or in some comet’s traces caught,</span>
<span class="line-indent1">Has bolted from the earth to away!”</span></p>
