

<span class="page">410</span>
<h3 class="title">On Hearing that certain low fellows had defamed me.</h3>

<p class="stanza"><span class="line">I were indeed a very ass</span>
<span class="line">To heed the censures muckworms pass</span>
<span class="line-indent1">Upon my nature. They, poor elves,</span>
<span class="line">Are nurtured in the scurvy trick</span>
<span class="line">That prompts them, on the clean to stick</span>
<span class="line-indent1">The dirt they find upon themselves.</span></p>
