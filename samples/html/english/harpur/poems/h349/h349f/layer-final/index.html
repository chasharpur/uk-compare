
<span class="page">105</span>
<h3 class="parthead">XXIV.</h3>

<h3 class="title">A MAN CAN ONLY BE JUDGED BY HIS
PEERS.</h3>

<p class="stanza"><span class="line-indent1">My Lilius, never deign to heed</span>
<span class="line-indent1">The judgments men of venal breed</span>
<span class="line">Pass on <span class="italics">thy</span> nobler nature! They, poor elves,</span>
<span class="line-indent1">Are born into the scurvy trick</span>
<span class="line-indent1">Which prompts them on the clean to stick</span>
<span class="line">Some of that scoundrel dirt they find upon them<span class="soft-hyphen"><span class="soft-hyphen">-
</span></span>selves!</span></p>
