

<span class="page">418</span>
<h3 class="title">A man can only be judged by his peers.</h3>

<p class="stanza"><span class="line-indent1">My Lilius, never deign to heed</span>
<span class="line-indent1">The <span class="unclear"></span> judgments men of venal breed</span>
<span class="line">Pass on thy nobler nature! They, poor elves,</span>
<span class="line-indent1">Are born into the scurvy trick</span>
<span class="line-indent1">That prompts them on the clean to stick</span>
<span class="line">Some of that scoundrel dirt they find upon themselves!</span></p>
