<h3 class="title">Epigram</h3>

<p class="stanza"><span class="line">I could not be so mere an ass</span>
<span class="line">As heed the sentence earthworms pass</span>
<span class="line">Upon my nature. They, poor elves!</span>
<span class="line">Are born and nurtured in the trick</span>
<span class="line">Upon their fellow ma</span>
<span class="line">And wish on other men to stick</span>
<span class="line">The dirt they find upon themselves.</span></p>
