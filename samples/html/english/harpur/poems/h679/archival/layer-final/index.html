<h3 class="title">[WHO LIVES BUT TO THE PRESENT IS A DUNCE]</h3>

<p class="stanza"><span class="line">Who lives but to the Present is a dunce;</span>
<span class="line-indent1">Who lives but to Future, may at last</span>
<span class="line-indent2">Turn out a dreamer, and forgotten be:</span>
<span class="line">But True Men move the Present, and at once</span>
<span class="line-indent1">It is the sweet child of a better Past,</span>
<span class="line-indent2">And mother of a raised Futurity!</span></p>
