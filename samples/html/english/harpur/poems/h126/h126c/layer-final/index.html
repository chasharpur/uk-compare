

<span class="page">625</span>

<h3 class="title">[FALLING AWAY]</h3>

<p class="stanza"><span class="line">[...] It is <span class="underlined">not</span> that we are losers</span>
<span class="line">Of aught the sordid prize;</span>
<span class="line">And scorn breeds scorn, and memory, wronged,</span>
<span class="line">Will teach us to despise:</span>
<span class="line">But oh! the waste of heart-faith,</span>
<span class="line">When to friendship’s cold disgrace,</span>
<span class="line">Some old acquaintance meets us—with</span>
<span class="line">A frost upon his face!</span></p>
