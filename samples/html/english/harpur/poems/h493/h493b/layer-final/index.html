<h3 class="parthead">XI.</h3>
<h3 class="title">A SECRET OF ENMITY.</h3>

<p class="stanza"><span class="line">Why in the article of Enmity,</span>
<span class="line">Does Tom make Charles so much his debtor?</span>
<span class="line">Why, just because the latter could not be</span>
<span class="line-indent1">So much Tom’s enemy,</span>
<span class="line-indent1">As he’s Tom’s better.</span></p>
