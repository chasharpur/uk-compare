

<span class="page">424</span>
<h3 class="title">Life without and within.</h3>

<p class="stanza"><span class="line">How vain, how worthless, seem when we scan</span>
<span class="line">Its outside only—and we laugh at Man!</span>
<span class="line">But when we pore into its depths, we see</span>
<span class="line">An awful import in its mystery:</span>
<span class="line">For what is deep is holy, and must tend</span>
<span class="line">To some divine universal end.</span></p>
