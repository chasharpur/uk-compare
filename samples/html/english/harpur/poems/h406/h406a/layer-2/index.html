

<span class="page">73</span>
<h3 class="title">[PSALM XIII]</h3>

<p class="stanza"><span class="line">Even God hath judged us in the right,</span>
<span class="line">And wholly swept him from our sight!</span></p>

<p class="stanza"><span class="line">But I, Lord, in thy righteous power</span>
<span class="line">Have trusted for salvation’s hour;</span>
<span class="line">And yet shall teach my harp’s glad strings</span>
<span class="line">The healing strength thy beauty brings.</span></p>
